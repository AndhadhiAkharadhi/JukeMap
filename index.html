    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root { --bg: #0a0a0a; --panel: #141414; --accent: #ffffff; --text: #e0e0e0; --text-sec: #666; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; overflow: hidden; position: fixed; width: 100%; height: 100%; }
        
        /* Map */
        #map { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; filter: invert(1) hue-rotate(180deg) contrast(1.1); }
        .leaflet-control-attribution { display: none; }
        
        /* Overlays/Panels */
        .overlay-panel { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10,10,10,0.98); z-index: 1000; display: none; flex-direction: column; padding: 20px; padding-top: 60px; overflow-y: auto; }
        .overlay-panel.active { display: flex; }
        .overlay-close { position: absolute; top: 20px; right: 20px; width: 40px; height: 40px; background: none; border: 1px solid var(--text-sec); color: var(--text); font-size: 24px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .overlay-title { font-size: 24px; font-weight: 300; letter-spacing: 4px; margin-bottom: 30px; text-align: center; border-bottom: 1px solid var(--panel); padding-bottom: 20px; }
        
        /* Chat */
        #chatMessages { flex: 1; overflow-y: auto; margin-bottom: 20px; padding: 10px; background: var(--panel); border-radius: 12px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.4; word-wrap: break-word; }
        .msg.own { align-self: flex-end; background: var(--accent); color: var(--bg); border-bottom-right-radius: 4px; }
        .msg.other { align-self: flex-start; background: #222; color: var(--text); border-bottom-left-radius: 4px; }
        .msg.system { align-self: center; background: transparent; color: var(--text-sec); font-size: 12px; font-style: italic; max-width: 90%; text-align: center; }
        .msg .location-tag { display: block; margin-top: 4px; font-size: 11px; opacity: 0.8; text-decoration: underline; cursor: pointer; }
        .chat-input-area { display: flex; gap: 10px; margin-bottom: 10px; }
        .panel-input { flex: 1; background: var(--panel); border: 1px solid #333; color: var(--text); padding: 12px 16px; border-radius: 25px; font-size: 15px; outline: none; }
        .send-btn { width: 50px; height: 50px; border-radius: 50%; background: var(--accent); color: var(--bg); border: none; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .action-row { display: flex; gap: 10px; justify-content: center; margin-bottom: 10px; }
        .action-btn { padding: 8px 16px; background: transparent; border: 1px solid var(--text-sec); color: var(--text-sec); border-radius: 20px; font-size: 12px; cursor: pointer; transition: all 0.3s; }
        .action-btn:hover { border-color: var(--accent); color: var(--accent); }
        
        /* Quiz */
        .quiz-question { padding: 20px; text-align: center; font-size: 18px; font-weight: 300; line-height: 1.5; margin-bottom: 20px; background: var(--panel); border-radius: 12px; }
        .quiz-options { display: flex; flex-direction: column; gap: 12px; margin-bottom: 30px; }
        .quiz-option { padding: 18px; background: rgba(255,255,255,0.03); border: 1px solid #333; border-radius: 12px; cursor: pointer; transition: all 0.2s; text-align: center; font-size: 15px; }
        .quiz-option:hover { background: rgba(255,255,255,0.08); border-color: #555; }
        .quiz-option.correct { background: #1a4d1a !important; border-color: #2d8a2d; color: #fff; }
        .quiz-option.wrong { background: #4d1a1a !important; border-color: #8a2d2d; color: #fff; }
        .quiz-option.disabled { pointer-events: none; opacity: 0.6; }
        .quiz-stats { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: var(--panel); border-radius: 12px; margin-bottom: 20px; font-size: 14px; }
        .leaderboard { background: var(--panel); border-radius: 12px; padding: 15px; }
        .lb-title { font-size: 12px; text-transform: uppercase; letter-spacing: 2px; color: var(--text-sec); margin-bottom: 15px; text-align: center; }
        .lb-entry { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #222; font-size: 14px; }
        .lb-entry:last-child { border-bottom: none; }
        .lb-entry.top { color: var(--accent); font-weight: 600; }
        
        /* Search/Music */
        #searchResults { max-height: 400px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .search-result { display: flex; align-items: center; gap: 15px; padding: 12px; background: var(--panel); border-radius: 10px; cursor: pointer; transition: all 0.2s; border: 1px solid transparent; }
        .search-result:hover { border-color: var(--text-sec); }
        .search-thumb { width: 60px; height: 45px; background: #222; border-radius: 6px; object-fit: cover; }
        .search-info { flex: 1; }
        .search-title { font-size: 14px; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .search-meta { font-size: 12px; color: var(--text-sec); }
        .search-type { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; padding: 4px 8px; background: #222; border-radius: 4px; color: var(--text-sec); }
        
        /* Mini Player */
        #miniPlayer { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(200%); width: 90%; max-width: 400px; background: rgba(20,20,20,0.95); backdrop-filter: blur(20px); border: 1px solid #333; border-radius: 16px; padding: 15px; z-index: 500; transition: transform 0.3s ease; }
        #miniPlayer.active { transform: translateX(-50%) translateY(0); }
        .player-track { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
        .player-art { width: 40px; height: 40px; background: #333; border-radius: 6px; }
        .player-info { flex: 1; overflow: hidden; }
        .player-title { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .player-artist { font-size: 11px; color: var(--text-sec); }
        .player-controls { display: flex; justify-content: center; gap: 20px; }
        .p-btn { background: none; border: none; color: var(--text); font-size: 20px; cursor: pointer; }
        .progress-bar { width: 100%; height: 2px; background: #333; margin-top: 10px; border-radius: 2px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width 1s linear; }
        
        /* FAB Menu */
        #fabContainer { position: fixed; bottom: 30px; right: 30px; z-index: 100; }
        #fabMain { width: 60px; height: 60px; border-radius: 50%; background: var(--accent); color: var(--bg); border: none; font-size: 24px; cursor: pointer; box-shadow: 0 4px 20px rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; transition: transform 0.3s; }
        #fabMain.active { transform: rotate(45deg); }
        .fab-menu { position: absolute; bottom: 70px; right: 0; display: flex; flex-direction: column; gap: 15px; opacity: 0; pointer-events: none; transition: all 0.3s; transform: translateY(20px); }
        .fab-menu.active { opacity: 1; pointer-events: all; transform: translateY(0); }
        .fab-item { display: flex; align-items: center; gap: 10px; justify-content: flex-end; }
        .fab-label { background: var(--panel); padding: 8px 16px; border-radius: 20px; font-size: 12px; color: var(--text); border: 1px solid #333; white-space: nowrap; }
        .fab-btn { width: 50px; height: 50px; border-radius: 50%; background: var(--panel); border: 1px solid #444; color: var(--text); font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .fab-btn:hover { background: var(--accent); color: var(--bg); border-color: var(--accent); }
        
        /* Location Gate */
        #locationGate { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center; }
        .gate-logo { font-size: 48px; letter-spacing: 8px; margin-bottom: 20px; font-weight: 300; }
        .gate-text { color: var(--text-sec); margin-bottom: 40px; line-height: 1.6; max-width: 300px; }
        .gate-btn { padding: 16px 48px; background: var(--accent); color: var(--bg); border: none; border-radius: 30px; font-size: 16px; cursor: pointer; letter-spacing: 2px; transition: all 0.3s; }
        .gate-btn:hover { transform: scale(1.05); }
        
        /* Toast */
        #toast { position: fixed; bottom: 150px; left: 50%; transform: translateX(-50%) translateY(100px); background: rgba(255,255,255,0.95); color: var(--bg); padding: 12px 24px; border-radius: 30px; font-size: 14px; z-index: 3000; opacity: 0; transition: all 0.3s; pointer-events: none; font-weight: 500; }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        
        /* Voice Animation */
        .voice-indicator { display: none; position: fixed; bottom: 200px; left: 50%; transform: translateX(-50%); z-index: 2500; }
        .voice-indicator.active { display: block; }
        .voice-wave { display: flex; gap: 4px; align-items: center; height: 40px; }
        .wave-bar { width: 4px; background: var(--accent); border-radius: 2px; animation: wave 1s ease-in-out infinite; }
        .wave-bar:nth-child(1) { height: 20%; animation-delay: 0s; }
        .wave-bar:nth-child(2) { height: 60%; animation-delay: 0.1s; }
        .wave-bar:nth-child(3) { height: 40%; animation-delay: 0.2s; }
        .wave-bar:nth-child(4) { height: 80%; animation-delay: 0.3s; }
        .wave-bar:nth-child(5) { height: 30%; animation-delay: 0.4s; }
        @keyframes wave { 0%, 100% { transform: scaleY(0.5); } 50% { transform: scaleY(1); } }
        
        @media (max-width: 480px) {
            .overlay-panel { padding: 15px; padding-top: 50px; }
            .overlay-title { font-size: 20px; margin-bottom: 20px; }
            #fabContainer { bottom: 20px; right: 20px; }
            #miniPlayer { width: 95%; bottom: 90px; }
        }
    </style>
</head>
<body>

    <!-- Location Gate -->
    <div id="locationGate">
        <div class="gate-logo">NABE</div>
        <div class="gate-text">Standortfreigabe erforderlich für lokale Intelligenz<br><br>Dein Standort bleibt anonym. Keine Speicherung auf Servern.</div>
        <button class="gate-btn" onclick="requestLocation()">STANDORT FREIGEBEN</button>
    </div>

    <!-- Map -->
    <div id="map"></div>

    <!-- Voice Indicator -->
    <div class="voice-indicator" id="voiceIndicator">
        <div class="voice-wave">
            <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
        </div>
    </div>

    <!-- Mini Player -->
    <div id="miniPlayer">
        <div class="player-track">
            <img class="player-art" id="playerArt" src="">
            <div class="player-info">
                <div class="player-title" id="playerTitle">Kein Track</div>
                <div class="player-artist" id="playerArtist">Warte auf Auswahl...</div>
            </div>
        </div>
        <div class="player-controls">
            <button class="p-btn" onclick="playerPrev()">⏮</button>
            <button class="p-btn" onclick="playerToggle()" id="playPauseBtn">▶</button>
            <button class="p-btn" onclick="playerNext()">⏭</button>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>

    <!-- FAB Menu -->
    <div id="fabContainer">
        <div class="fab-menu" id="fabMenu">
            <div class="fab-item"><span class="fab-label">Standort teilen</span><button class="fab-btn" onclick="shareLocation()">📍</button></div>
            <div class="fab-item"><span class="fab-label">Quiz</span><button class="fab-btn" onclick="toggleQuiz()">❓</button></div>
            <div class="fab-item"><span class="fab-label">Musik suchen</span><button class="fab-btn" onclick="toggleSearch()">⌕</button></div>
            <div class="fab-item"><span class="fab-label">Chat</span><button class="fab-btn" onclick="toggleChat()">💬</button></div>
        </div>
        <button id="fabMain" onclick="toggleFab()">+</button>
    </div>

    <!-- Chat Overlay -->
    <div id="chatOverlay" class="overlay-panel">
        <button class="overlay-close" onclick="toggleChat()">×</button>
        <div class="overlay-title">NACHRICHTEN</div>
        <div id="chatMessages"></div>
        <div class="action-row">
            <button class="action-btn" onclick="startVoiceInput()">🎤 Spracheingabe</button>
            <button class="action-btn" onclick="shareLocation()">📍 Standort</button>
        </div>
        <div class="chat-input-area">
            <input type="text" class="panel-input" id="chatInput" placeholder="Nachricht..." onkeypress="if(event.key==='Enter') sendChatMessage()">
            <button class="send-btn" onclick="sendChatMessage()">➤</button>
        </div>
    </div>

    <!-- Quiz Overlay -->
    <div id="quizOverlay" class="overlay-panel">
        <button class="overlay-close" onclick="toggleQuiz()">×</button>
        <div class="overlay-title">QUIZ</div>
        <div class="quiz-stats">
            <span>Punkte: <b id="scoreDisplay">0</b></span>
            <span>Frage <b id="questionDisplay">1</b>/10</span>
        </div>
        <div class="quiz-question" id="quizQuestion">Lade Frage...</div>
        <div class="quiz-options" id="quizOptions"></div>
        <div class="leaderboard">
            <div class="lb-title">🏆 Bestenliste (Lokal)</div>
            <div id="quizLeaderboard"></div>
        </div>
    </div>

    <!-- Search Overlay -->
    <div id="searchOverlay" class="overlay-panel">
        <button class="overlay-close" onclick="toggleSearch()">×</button>
        <div class="overlay-title">MUSIKSUCHE</div>
        <div class="chat-input-area">
            <input type="text" class="panel-input" id="searchInput" placeholder="Song, Künstler oder Ort..." onkeypress="if(event.key==='Enter') performSearch()">
            <button class="send-btn" onclick="performSearch()">🔍</button>
        </div>
        <div id="searchResults"></div>
    </div>

    <!-- Toast -->
    <div id="toast"></div>

    <script>
        // ===================== KONFIGURATION =====================
        // ⚠️ ERSETZE DIES MIT DEINEN ECHTEN FIREBASE-DATEN!
        const firebaseConfig = {
            apiKey: "AIzaSyXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX", // ← Hier einfügen
            authDomain: "dein-projekt.firebaseapp.com",
            databaseURL: "https://dein-projekt-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "dein-projekt",
            storageBucket: "dein-projekt.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456789:web:abcdef123456"
        };
        
        // YouTube API Key (optional, für echte Suche)
        const YOUTUBE_API_KEY = "YOUR_YOUTUBE_API_KEY"; // ← Optional
        
        // Quiz-Daten (20 Fragen)
        const quizData = [
            {q: "Welches ist das kleinste Bundesland Deutschlands?", options: ["Saarland", "Bremen", "Hamburg"], correct: 1},
            {q: "Wie viele Prozent der Erdoberfläche sind Wasser?", options: ["51%", "71%", "91%"], correct: 1},
            {q: "In welchem Jahr wurde die Berliner Mauer gebaut?", options: ["1953", "1961", "1968"], correct: 1},
            {q: "Was ist die Quadratwurzel von 144?", options: ["10", "12", "14"], correct: 1},
            {q: "Welches Element hat das chemische Symbol 'Fe'?", options: ["Fluor", "Eisen", "Francium"], correct: 1},
            {q: "Wer schrieb 'Faust'?", options: ["Schiller", "Goethe", "Lessing"], correct: 1},
            {q: "Wie viele Kontinente gibt es?", options: ["5", "6", "7"], correct: 2},
            {q: "Was ist die Hauptstadt von Kanada?", options: ["Toronto", "Vancouver", "Ottawa"], correct: 2},
            {q: "Wie viele Planeten hat unser Sonnensystem?", options: ["7", "8", "9"], correct: 1},
            {q: "In welchem Jahr fiel die Berliner Mauer?", options: ["1987", "1989", "1991"], correct: 1},
            {q: "Wie viele Bits sind ein Byte?", options: ["4", "8", "16"], correct: 1},
            {q: "Wer malte die Mona Lisa?", options: ["Michelangelo", "Leonardo da Vinci", "Raphael"], correct: 1},
            {q: "Was ist die größte Wüste der Welt?", options: ["Sahara", "Antarktis", "Gobi"], correct: 1},
            {q: "Wie viele Herzen hat ein Oktopus?", options: ["1", "2", "3"], correct: 2},
            {q: "Welches Land hat die meisten Einwohner?", options: ["Indien", "China", "USA"], correct: 0},
            {q: "Was bedeutet 'NABE'?", options: ["Nachbarschaft", "Navigation Based Environment", "Kein Akronym"], correct: 1},
            {q: "Wie viele Zeitzonen hat Russland?", options: ["5", "9", "11"], correct: 2},
            {q: "Welcher ist der höchste Berg Europas?", options: ["Mont Blanc", "Elbrus", "Matterhorn"], correct: 1},
            {q: "In welchem Jahr wurde das iPhone veröffentlicht?", options: ["2005", "2007", "2009"], correct: 1},
            {q: "Wie viele Farben hat ein Regenbogen?", options: ["5", "7", "9"], correct: 1}
        ];

        // ===================== GLOBALE VARIABLEN =====================
        let map, currentPosition, chatDB, player, currentTrack = null, isPlaying = false;
        let quizIndex = 0, quizScore = 0, quizAnswered = false;
        let messageQueue = [];

        // ===================== INITIALISIERUNG =====================
        // Firebase initialisieren (wenn Config vorhanden)
        let firebaseInitialized = false;
        try {
            if (firebaseConfig.apiKey.includes("XXXX")) {
                console.log("Firebase: Mock-Modus (keine Keys)");
                simulateIncomingMessages();
            } else {
                firebase.initializeApp(firebaseConfig);
                chatDB = firebase.database().ref('nabeChat');
                chatDB.on('child_added', snap => {
                    const msg = snap.val();
                    if (!msg.own) addChatMessage(msg, true);
                });
                firebaseInitialized = true;
            }
        } catch(e) {
            console.error("Firebase Error:", e);
            simulateIncomingMessages();
        }

        function simulateIncomingMessages() {
            // Demo-Nachrichten wenn kein Firebase
            setTimeout(() => {
                addChatMessage({text: "Willkommen bei NABE! 👋", system: true});
            }, 2000);
        }

        // ===================== STANDORT & KARTE =====================
        function requestLocation() {
            if (!navigator.geolocation) {
                showToast("Geolocation nicht unterstützt");
                initMap([52.52, 13.405]); // Berlin Fallback
                return;
            }
            
            navigator.geolocation.getCurrentPosition(
                pos => {
                    const coords = [pos.coords.latitude, pos.coords.longitude];
                    document.getElementById('locationGate').style.opacity = '0';
                    setTimeout(() => document.getElementById('locationGate').remove(), 500);
                    initMap(coords);
                },
                err => {
                    showToast("Standortzugriff verweigert. Fallback Berlin.");
                    initMap([52.52, 13.405]);
                },
                {enableHighAccuracy: true, timeout: 10000}
            );
        }

        function initMap(coords) {
            currentPosition = coords;
            map = L.map('map', {zoomControl: false, attributionControl: false}).setView(coords, 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19
            }).addTo(map);
            
            // Eigene Position markieren
            L.circleMarker(coords, {
                radius: 8,
                fillColor: "#ffffff",
                color: "#000",
                weight: 2,
                opacity: 1,
                fillOpacity: 1
            }).addTo(map).bindPopup("Du bist hier").openPopup();
            
            // Demo-Orte in der Nähe
            if (coords[0] !== 52.52) addNearbyPlaces(coords);
        }

        function addNearbyPlaces(center) {
            const places = [
                {name: "Café Central", lat: center[0]+0.001, lng: center[1]+0.001, type: "coffee"},
                {name: "Parkbank", lat: center[0]-0.001, lng: center[1]-0.001, type: "park"},
                {name: "U-Bahn Station", lat: center[0]+0.0015, lng: center[1]-0.0008, type: "transport"}
            ];
            
            places.forEach(p => {
                L.marker([p.lat, p.lng]).addTo(map)
                    .bindPopup(`<b>${p.name}</b><br>${p.type}`);
            });
        }

        function shareLocation() {
            if (!currentPosition) {
                showToast("Kein Standort verfügbar");
                return;
            }
            const lat = currentPosition[0].toFixed(4);
            const lng = currentPosition[1].toFixed(4);
            const msg = {
                text: `Mein Standort: ${lat}, ${lng}`,
                location: {lat, lng},
                timestamp: Date.now(),
                own: true
            };
            addChatMessage(msg);
            if (firebaseInitialized) chatDB.push(msg);
            showToast("Standort geteilt!");
            if (document.getElementById('chatOverlay').classList.contains('active')) {
                toggleFab(); // Menü schließen falls offen
            }
        }

        // ===================== CHAT SYSTEM =====================
        function toggleChat() {
            document.getElementById('chatOverlay').classList.toggle('active');
            if (document.getElementById('chatOverlay').classList.contains('active')) {
                scrollToBottom();
            }
        }

        function addChatMessage(msg, fromOthers = false) {
            const container = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = 'msg ' + (msg.system ? 'system' : (msg.own ? 'own' : 'other'));
            
            let content = msg.text;
            if (msg.location) {
                content += `<span class="location-tag" onclick="map.setView([${msg.location.lat}, ${msg.location.lng}], 16)">📍 Auf Karte zeigen</span>`;
            }
            div.innerHTML = content;
            container.appendChild(div);
            scrollToBottom();
        }

        function sendChatMessage() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text) return;
            
            const msg = {
                text: text,
                timestamp: Date.now(),
                own: true
            };
            addChatMessage(msg);
            if (firebaseInitialized) chatDB.push(msg);
            input.value = '';
        }

        function scrollToBottom() {
            const container = document.getElementById('chatMessages');
            container.scrollTop = container.scrollHeight;
        }

        // ===================== SPRACHEINGABE =====================
        function startVoiceInput() {
            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                showToast("Spracherkennung nicht verfügbar");
                return;
            }
            
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            const recognition = new SpeechRecognition();
            recognition.lang = 'de-DE';
            recognition.continuous = false;
            recognition.interimResults = false;
            
            document.getElementById('voiceIndicator').classList.add('active');
            
            recognition.onresult = event => {
                const text = event.results[0][0].transcript;
                document.getElementById('chatInput').value = text;
                setTimeout(() => sendChatMessage(), 500);
                document.getElementById('voiceIndicator').classList.remove('active');
            };
            
            recognition.onerror = () => {
                showToast("Spracherkennung fehlgeschlagen");
                document.getElementById('voiceIndicator').classList.remove('active');
            };
            
            recognition.onend = () => {
                document.getElementById('voiceIndicator').classList.remove('active');
            };
            
            recognition.start();
        }

        // ===================== QUIZ SYSTEM =====================
        function toggleQuiz() {
            const overlay = document.getElementById('quizOverlay');
            overlay.classList.toggle('active');
            if (overlay.classList.contains('active')) {
                initQuiz();
            }
        }

        function initQuiz() {
            quizIndex = 0;
            quizScore = 0;
            updateQuizStats();
            loadQuestion();
            updateLeaderboard();
        }

        function loadQuestion() {
            if (quizIndex >= 10) {
                endQuiz();
                return;
            }
            const q = quizData[quizIndex];
            document.getElementById('quizQuestion').textContent = q.q;
            const optsContainer = document.getElementById('quizOptions');
            optsContainer.innerHTML = '';
            
            q.options.forEach((opt, idx) => {
                const btn = document.createElement('div');
                btn.className = 'quiz-option';
                btn.textContent = opt;
                btn.onclick = () => checkAnswer(idx, btn);
                optsContainer.appendChild(btn);
            });
            quizAnswered = false;
            updateQuizStats();
        }

        function checkAnswer(selectedIdx, btnElement) {
            if (quizAnswered) return;
            quizAnswered = true;
            
            const q = quizData[quizIndex];
            const options = document.querySelectorAll('.quiz-option');
            
            options.forEach((opt, idx) => {
                opt.classList.add('disabled');
                if (idx === q.correct) opt.classList.add('correct');
            });
            
            if (selectedIdx === q.correct) {
                quizScore += 10;
                showToast("Richtig! +10 Punkte");
            } else {
                btnElement.classList.add('wrong');
                showToast("Falsch!");
            }
            
            updateQuizStats();
            setTimeout(() => {
                quizIndex++;
                loadQuestion();
            }, 1500);
        }

        function updateQuizStats() {
            document.getElementById('scoreDisplay').textContent = quizScore;
            document.getElementById('questionDisplay').textContent = Math.min(quizIndex + 1, 10);
        }

        function endQuiz() {
            document.getElementById('quizQuestion').textContent = `Quiz beendet! Du hast ${quizScore}/100 Punkten erreicht.`;
            document.getElementById('quizOptions').innerHTML = '<button class="quiz-option" onclick="initQuiz()" style="background:rgba(255,255,255,0.1)">Neues Quiz starten</button>';
            saveScore(quizScore);
        }

        function saveScore(score) {
            const lb = JSON.parse(localStorage.getItem('nabeQuizLB') || '[]');
            const entry = {name: 'Du', score: score, date: new Date().toLocaleDateString()};
            lb.push(entry);
            lb.sort((a,b) => b.score - a.score);
            localStorage.setItem('nabeQuizLB', JSON.stringify(lb.slice(0, 10)));
            updateLeaderboard();
        }

        function updateLeaderboard() {
            const lb = JSON.parse(localStorage.getItem('nabeQuizLB') || '[]');
            const container = document.getElementById('quizLeaderboard');
            if (lb.length === 0) {
                container.innerHTML = '<div style="text-align:center;color:#666;font-size:13px">Noch keine Einträge</div>';
                return;
            }
            container.innerHTML = lb.slice(0, 5).map((e,i) => 
                `<div class="lb-entry ${i===0?'top':''}"><span>${i+1}. ${e.name}</span><span>${e.score} Pkt</span></div>`
            ).join('');
        }

        // ===================== MUSIKSUCHE & PLAYER =====================
        function toggleSearch() {
            document.getElementById('searchOverlay').classList.toggle('active');
        }

        async function performSearch() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return;
            
            const container = document.getElementById('searchResults');
            container.innerHTML = '<div style="text-align:center;padding:20px;color:#666">Suche...</div>';
            
            // Wenn YouTube API Key vorhanden, echte Suche
            if (YOUTUBE_API_KEY && !YOUTUBE_API_KEY.includes("YOUR")) {
                try {
                    const res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=5&q=${encodeURIComponent(query)}&type=video&key=${YOUTUBE_API_KEY}`);
                    const data = await res.json();
                    displayYouTubeResults(data.items);
                } catch(e) {
                    fallbackSearch(query);
                }
            } else {
                // Fallback: Demo-Ergebnisse
                setTimeout(() => fallbackSearch(query), 500);
            }
        }

        function fallbackSearch(query) {
            const mockResults = [
                {id: 'dQw4w9WgXcQ', title: `${query} (Official Video)`, artist: 'YouTube Music', thumb: 'https://img.youtube.com/vi/dQw4w9WgXcQ/mqdefault.jpg'},
                {id: '9bZkp7q19f0', title: `${query} - Live Version`, artist: 'Live Channel', thumb: 'https://img.youtube.com/vi/9bZkp7q19f0/mqdefault.jpg'},
                {id: 'kJQP7kiw5Fk', title: `Best of ${query}`, artist: 'Mix Channel', thumb: 'https://img.youtube.com/vi/kJQP7kiw5Fk/mqdefault.jpg'}
            ];
            displayYouTubeResults(mockResults.map(r => ({
                id: {videoId: r.id},
                snippet: {title: r.title, channelTitle: r.artist, thumbnails: {medium: {url: r.thumb}}}
            })));
        }

        function displayYouTubeResults(items) {
            const container = document.getElementById('searchResults');
            container.innerHTML = items.map(item => `
                <div class="search-result" onclick="playTrack('${item.id.videoId}', '${escapeHtml(item.snippet.title)}', '${escapeHtml(item.snippet.channelTitle)}', '${item.snippet.thumbnails.medium.url}')">
                    <img class="search-thumb" src="${item.snippet.thumbnails.medium.url}">
                    <div class="search-info">
                        <div class="search-title">${escapeHtml(item.snippet.title)}</div>
                        <div class="search-meta">${escapeHtml(item.snippet.channelTitle)}</div>
                    </div>
                    <span class="search-type">▶</span>
                </div>
            `).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function playTrack(videoId, title, artist, thumb) {
            currentTrack = {videoId, title, artist, thumb};
            
            // YouTube Player initialisieren (versteckt)
            if (player) player.destroy();
            
            const div = document.createElement('div');
            div.id = 'ytPlayer';
            div.style.position = 'absolute';
            div.style.left = '-9999px';
            document.body.appendChild(div);
            
            // Lade YouTube IFrame API
            if (!window.YT) {
                const tag = document.createElement('script');
                tag.src = "https://www.youtube.com/iframe_api";
                document.body.appendChild(tag);
                window.onYouTubeIframeAPIReady = () => createPlayer(videoId);
            } else {
                createPlayer(videoId);
            }
            
            document.getElementById('playerTitle').textContent = title;
            document.getElementById('playerArtist').textContent = artist;
            document.getElementById('playerArt').src = thumb;
            document.getElementById('miniPlayer').classList.add('active');
            document.getElementById('playPauseBtn').textContent = '⏸';
            isPlaying = true;
            
            toggleSearch();
            toggleFab();
        }

        function createPlayer(videoId) {
            player = new YT.Player('ytPlayer', {
                height: '1',
                width: '1',
                videoId: videoId,
                playerVars: {autoplay: 1, controls: 0},
                events: {
                    onStateChange: onPlayerStateChange
                }
            });
        }

        function onPlayerStateChange(event) {
            if (event.data === YT.PlayerState.ENDED) {
                document.getElementById('playPauseBtn').textContent = '▶';
                isPlaying = false;
            }
        }

        function playerToggle() {
            if (!player) return;
            if (isPlaying) {
                player.pauseVideo();
                document.getElementById('playPauseBtn').textContent = '▶';
            } else {
                player.playVideo();
                document.getElementById('playPauseBtn').textContent = '⏸';
            }
            isPlaying = !isPlaying;
        }

        function playerNext() {
            showToast("Nächster Track (Demo)");
        }

        function playerPrev() {
            showToast("Vorheriger Track (Demo)");
        }

        // ===================== UI UTILS =====================
        function toggleFab() {
            const menu = document.getElementById('fabMenu');
            const btn = document.getElementById('fabMain');
            menu.classList.toggle('active');
            btn.classList.toggle('active');
        }

        function showToast(text) {
            const toast = document.getElementById('toast');
            toast.textContent = text;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // ===================== SERVICE WORKER (PWA) =====================
        if ('serviceWorker' in navigator) {
            const swCode = `
                self.addEventListener('install', e => {
                    e.waitUntil(
                        caches.open('nabe-v1').then(cache => 
                            cache.addAll([
                                'https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css',
                                'https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js'
                            ])
                        )
                    );
                    self.skipWaiting();
                });
                self.addEventListener('activate', e => {
                    e.waitUntil(self.clients.claim());
                });
                self.addEventListener('fetch', e => {
                    e.respondWith(
                        caches.match(e.request).then(response => {
                            if (response) return response;
                            return fetch(e.request).catch(() => {
                                if (e.request.destination === 'image') {
                                    return new Response();
                                }
                            });
                        })
                    );
                });
            `;
            
            const blob = new Blob([swCode], {type: 'application/javascript'});
            const swUrl = URL.createObjectURL(blob);
            
            navigator.serviceWorker.register(swUrl).then(() => {
                console.log('Service Worker registriert');
            }).catch(err => {
                console.log('SW Registrierung fehlgeschlagen:', err);
            });
        }

        // ===================== KEYBOARD HANDLING =====================
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') {
                document.querySelectorAll('.overlay-panel').forEach(el => el.classList.remove('active'));
                document.getElementById('fabMenu').classList.remove('active');
                document.getElementById('fabMain').classList.remove('active');
            }
        });

        // Click outside to close FAB
        document.addEventListener('click', e => {
            if (!e.target.closest('#fabContainer') && document.getElementById('fabMenu').classList.contains('active')) {
                toggleFab();
            }
        });
    </script>
</body>
